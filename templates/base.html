{% load static %}
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Başbuğ E-Mutabakat{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">
    <header class="site-header">
        <div class="container header-inner">
            <a href="{% url 'mutabakat:index' %}" class="brand">
                <img src="{% static 'img/basbug_logo.png' %}" alt="Başbuğ" class="brand-logo">
                <span class="brand-divider"></span>
                <span class="brand-sub">E-Mutabakat</span>
            </a>
            <span class="header-tag">Online Cari Hesap Mutabakatı</span>
        </div>
    </header>

    <main class="site-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <span>© {% now "Y" %} Başbuğ Otomotiv</span>
            <span class="footer-sep">•</span>
            <span>Hata ve unutma müstesnadır.</span>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
